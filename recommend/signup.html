<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - RecommendationEngine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Jane Doe" required>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" required>

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat password" required>

      <button type="submit" class="btn btn-primary full-width">Create Account</button>
    </form>
    <p class="center">Already have an account? <a href="login.html">Log In</a></p>
  </div>
</body>
</html>
