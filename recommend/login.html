<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - RecommendationEngine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card">
    <h2>Log In</h2>
    <form>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit" class="btn btn-primary full-width">Log In</button>
    </form>
    <hr>
    <button class="btn btn-google full-width">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
      Continue with Google
    </button>
    <p class="center">Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>
</body>
</html>
